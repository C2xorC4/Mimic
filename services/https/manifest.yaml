name: https
port: 443
protocol: tcp
stateful: false
description: "Windows IIS TLS ServerHello (Schannel TLS 1.3) — JA3S: 772,4866,43-51"

probes:
  # TLS 1.0/1.2 ClientHello record header
  - name: tls_client_hello_legacy
    signature:
      pattern: '\x16\x03\x01'
      offset: 0
      min_length: 50
    response_file: responses/iis_server_hello.bin
    rewrite_rules:
      - offset: 11
        length: 32
        type: random
      - offset: 44
        length: 32
        type: random
      - offset: 95
        length: 32
        type: random

  # TLS 1.2/1.3 ClientHello record header
  - name: tls_client_hello
    signature:
      pattern: '\x16\x03\x03'
      offset: 0
      min_length: 50
    response_file: responses/iis_server_hello.bin
    rewrite_rules:
      - offset: 11
        length: 32
        type: random
      - offset: 44
        length: 32
        type: random
      - offset: 95
        length: 32
        type: random
