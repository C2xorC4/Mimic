# MSRPC (DCE/RPC Endpoint Mapper) Service Template
# Generated from Windows 11 captures
# Source OS: Windows 11

name: msrpc
port: 135
protocol: tcp
stateful: false

probes:
  # SMB1 Negotiate over port 135 (nmap cross-protocol probe)
  # nmap sends SMB negotiate to test if MSRPC responds as SMB
  # Windows responds with DCE/RPC bind_nack (type 13) - rejection
  # Pattern: 00 XX XX XX ff 53 4d 42 72 (NetBIOS + SMB1 magic + negotiate)
  - name: smb_over_msrpc
    signature:
      pattern: '\x00...\xffSMBr'
      offset: 0
      min_length: 39
    response_file: responses/bind_nack.bin
    rewrite_rules: []

  # SMB2 Negotiate over port 135 (nmap cross-protocol probe)
  # Pattern: 00 XX XX XX fe 53 4d 42 (NetBIOS + SMB2 magic)
  - name: smb2_over_msrpc
    signature:
      pattern: '\x00...\xfeSMB'
      offset: 0
      min_length: 50
    response_file: responses/bind_nack.bin
    rewrite_rules: []

  # Generic DCE/RPC bind_nack for unrecognized DCE/RPC requests
  # Catches DCE/RPC bind requests and returns proper rejection
  # First byte 0x05 = DCE/RPC version 5
  - name: dcerpc_bind_reject
    signature:
      pattern: '\x05\x00'
      offset: 0
      min_length: 16
    response_file: responses/bind_nack.bin
    rewrite_rules:
      # Echo the call_id from the request (bytes 12-15 in DCE/RPC header)
      - offset: 12
        length: 4
        type: echo
